security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:changeme}
    expiration: ${SECURITY_JWT_EXPIRATION:3600000} # 1 hour in ms
    refresh-expiration: ${SECURITY_JWT_REFRESH_EXPIRATION:604800000} # 7 days in ms

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qlm}
    username: ${SPRING_DATASOURCE_USERNAME:qlm}
    password: ${SPRING_DATASOURCE_PASSWORD:qlmpass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
